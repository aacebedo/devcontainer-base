[settings]
experimental = true

[env]
MISE_GITHUB_TOKEN = { required = true, redact = true }
AUBE_TRUST_POLICY = "off"

[tools]
uv = "0.11.1"
node = "24.18.0"
aube = "1.29.1"
markdownlint-cli2 = "0.23.0"
editorconfig-checker = "3.8.0"
hadolint = "2.14.0"
trivy = "0.72.0"
vale = "3.15.1"
go = "1.26.4"
yamllint = "1.38.0"
# taplo deactivated until their bug is fixed
#taplo = "0.10.0"
prek = "0.4.1"
"npm:@prantlf/jsonlint" = "17.0.1"
"npm:renovate" = "43.268.3"
shfmt = "3.13.0"
shellcheck = "0.11.0"
oras = "1.3.3"
"pipx:checkov" = "3.3.1"
"github:semrels/semrel" = "0.24.0"

[tools."github:semrels/condition-github-actions"]
version = "0.2.2"
rename_exe = "semrel-plugin-condition-github-actions"

[tools."github:semrels/generator-changelog-md"]
version = "0.7.0"
rename_exe = "semrel-plugin-generator-changelog-md"

[tools."github:semrels/analyzer-conventional"]
version = "0.3.2"
rename_exe = "semrel-plugin-analyzer-conventional"

[tools."github:semrels/publisher-oci"]
version = "0.2.0"
rename_exe = "semrel-plugin-publisher-oci"

[tools."github:semrels/provider-github"]
version = "0.4.2"
rename_exe = "semrel-plugin-provider-github"

[tools."github:semrels/generator-release-notes"]
version = "0.5.0"
rename_exe = "semrel-plugin-generator-release-notes"

[vars]
repo_owner = '''{{ exec(command="git remote get-url origin | awk -F'[/:]' '{print $(NF-1)}'") | trim }}'''
repo_name = '''{{ exec(command="git remote get-url origin | xargs basename -s .git") | trim }}'''
repo_url = "https://github.com/{{vars.repo_owner}}/{{vars.repo_name}}"
docker_tag = "ghcr.io/{{vars.repo_owner}}/{{vars.repo_name}}:latest"

[bootstrap.packages]
"apt:passwd" = "latest"
"apt:bash" = "latest"
"apt:podman" = "latest"
"apt:podman-docker" = "latest"
"apt:fuse-overlayfs" = "latest"
"apt:iptables" = "latest"
"apt:build-essential" = "latest"
